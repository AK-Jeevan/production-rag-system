name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:                             # allows manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy RAG System to EC2
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: rag-system
      IMAGE_TAG:  ${{ github.sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

      - name: Save Docker Image as Tarball
        run: |
          docker save $IMAGE_NAME:latest | gzip > rag-system.tar.gz

      - name: Copy Image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          source:      "rag-system.tar.gz,docker-compose.yml"
          target:      "/home/${{ secrets.EC2_USER }}/rag-system"

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/rag-system

            echo "📦 Loading Docker image..."
            docker load < rag-system.tar.gz

            echo "🛑 Stopping existing containers..."
            docker compose down --remove-orphans

            echo "🚀 Starting updated containers..."
            docker compose up -d

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment complete."

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🔍 Checking container health..."
            docker compose ps
            curl -f http://localhost:8000/api/v1/health || echo "❌ Health check failed"
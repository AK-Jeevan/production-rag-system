name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy RAG System to EC2
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: rag-system
      IMAGE_TAG: ${{ github.sha }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

      - name: Save Docker Image as Tarball
        run: docker save $IMAGE_NAME:latest | gzip > rag-system.tar.gz

      - name: Bundle Deployment Files
        run: |
          tar -czf deploy-bundle.tar.gz rag-system.tar.gz docker-compose.yml nginx/ prometheus/

      - name: Create Target Directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.EC2_USER }}/rag-system

      - name: Copy Deployment Bundle to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy-bundle.tar.gz"
          target: "/home/${{ secrets.EC2_USER }}/rag-system"

      - name: Extract and Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GOOGLE_API_KEY
          script: |
            set -eu
            cd /home/${{ secrets.EC2_USER }}/rag-system
            tar -xzf deploy-bundle.tar.gz
            rm -f deploy-bundle.tar.gz
            printf 'GOOGLE_API_KEY=%s\n' "$GOOGLE_API_KEY" > .env
            docker load < rag-system.tar.gz
            rm -f rag-system.tar.gz
            docker compose down --remove-orphans
            docker compose up -d --no-build
            docker image prune -f

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/rag-system
            docker compose ps
            for attempt in $(seq 1 12); do
              if curl --fail --silent http://localhost:8000/api/v1/health; then
                echo "Deployment health check passed."
                exit 0
              fi
              sleep 10
            done
            echo "Deployment health check failed."
            docker compose logs --tail=100 fastapi
            exit 1

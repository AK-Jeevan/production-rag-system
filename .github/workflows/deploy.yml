name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Push & Deploy RAG System
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/production-rag-system
      IMAGE_TAG:  ${{ github.sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 1: Build ────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      # ── Step 2: Decode SSH Key ───────────────────────────────────────────────
      - name: Decode SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      # ── Step 3: Free Disk Space on EC2 ──────────────────────────────────────
      - name: Free Disk Space on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY_B64 }}
          script: |
            set -e
            echo "🧹 Freeing disk space on EC2..."

            docker system prune -af --volumes

            sudo apt-get clean
            sudo apt-get autoremove -y

            echo "💾 Disk usage after cleanup:"
            df -h

      # ── Step 4: Deploy on EC2 ────────────────────────────────────────────────
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY_B64 }}
          script: |
            set -eu
            REMOTE_DIR="/home/$USER/production-rag-system"
            mkdir -p $REMOTE_DIR
            cd $REMOTE_DIR

            echo "🔐 Logging into DockerHub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

            echo "📥 Pulling latest image..."
            docker pull ${{ env.IMAGE_NAME }}:latest

            echo "📝 Writing .env file..."
            printf 'GOOGLE_API_KEY=%s\n' "${{ secrets.GOOGLE_API_KEY }}" > .env

            echo "🛑 Stopping existing containers..."
            docker compose down --remove-orphans

            echo "🚀 Starting updated containers..."
            IMAGE_NAME=${{ env.IMAGE_NAME }} \
            IMAGE_TAG=latest \
            docker compose up -d --no-build

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment complete."

      # ── Step 5: Verify Deployment ────────────────────────────────────────────
      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY_B64 }}
          script: |
            set -eu

            echo "🔍 Running containers:"
            docker compose -f /home/$USER/production-rag-system/docker-compose.yml ps

            echo "⏳ Waiting for health check..."
            for attempt in $(seq 1 12); do
              if curl --fail --silent http://localhost:8000/api/v1/health; then
                echo ""
                echo "✅ Health check passed on attempt $attempt."
                exit 0
              fi
              echo "⏳ Attempt $attempt/12 — retrying in 10s..."
              sleep 10
            done

            echo "❌ Health check failed after 12 attempts."
            echo "📋 Container logs:"
            docker compose -f /home/$USER/production-rag-system/docker-compose.yml logs --tail=100 fastapi
            exit 1

      # ── Step 6: Cleanup ──────────────────────────────────────────────────────
      - name: Cleanup SSH Key
        if: always()
        run: |
          rm -f /tmp/deploy_key
name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Push & Deploy RAG System
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/production-rag-system
      IMAGE_TAG:  ${{ github.sha }}
      REMOTE_DIR: /home/${{ secrets.EC2_USER }}/production-rag-system

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 1: Build & Push ─────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push:    true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      # ── Step 2: Upload docker-compose.yml to EC2 ────────────────────────────
      - name: Upload docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   "docker-compose.yml"
          target:   ${{ env.REMOTE_DIR }}

      # ── Step 3: Deploy on EC2 ────────────────────────────────────────────────
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -eu
            cd ${{ env.REMOTE_DIR }}

            echo "🔐 Logging into DockerHub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

            echo "📥 Pulling image..."
            docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

            echo "📝 Writing .env file..."
            cat > .env << EOF
            IMAGE_NAME=${{ env.IMAGE_NAME }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            EOF

            echo "✅ .env written:"
            cat .env

            echo "🛑 Stopping existing containers..."
            docker compose down --remove-orphans

            echo "🚀 Starting updated containers..."
            docker compose up -d --no-build

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment complete."

      # ── Step 4: Verify Deployment ────────────────────────────────────────────
      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -eu
            cd ${{ env.REMOTE_DIR }}

            echo "🔍 Running containers:"
            docker compose ps

            echo "⏳ Waiting for health check..."
            for attempt in $(seq 1 12); do
              if curl --fail --silent http://localhost:8000/api/v1/health; then
                echo ""
                echo "✅ Health check passed on attempt $attempt."
                exit 0
              fi
              echo "⏳ Attempt $attempt/12 — retrying in 10s..."
              sleep 10
            done

            echo "❌ Health check failed after 12 attempts."
            echo "📋 Container logs:"
            docker compose logs --tail=100 fastapi
            exit 1
events {
    worker_connections 1024;        # max simultaneous connections per worker
}

http {

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time ut=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    # ── Security Headers ──────────────────────────────────────────────────────
    server_tokens       off;        # hide nginx version from responses

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain
                      text/css
                      application/json
                      application/javascript
                      text/xml
                      application/xml;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream fastapi_backend {
        server fastapi:8000;
        keepalive 32;               # reuse connections to FastAPI
    }

    # ── Server ────────────────────────────────────────────────────────────────
    server {
        listen      80;
        server_name _;

        # ── Security ──────────────────────────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"             always;
        add_header X-Content-Type-Options "nosniff"                always;
        add_header X-XSS-Protection       "1; mode=block"          always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── RAG Query Route ───────────────────────────────────────────────────
        location /api/v1/query {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            client_max_body_size 1M;

            proxy_connect_timeout  60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # ── Streaming Route ───────────────────────────────────────────────────
        location /api/v1/query-stream {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Critical for SSE streaming — disable buffering
            proxy_buffering         off;
            proxy_cache             off;
            proxy_read_timeout      600s;   # long timeout for streaming responses
            chunked_transfer_encoding on;
        }

        # ── Upload Route ──────────────────────────────────────────────────────
        location /api/v1/upload {
            limit_req zone=upload_limit burst=5 nodelay;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            client_max_body_size 50M;       # only upload route needs large body
            proxy_connect_timeout  60s;
            proxy_send_timeout    300s;     # uploads can be slow
            proxy_read_timeout    300s;
        }

        # ── Metrics Route (internal only) ─────────────────────────────────────
        location /api/v1/metrics {
            allow 127.0.0.1;                # only allow localhost + Docker network
            allow 172.0.0.0/8;
            deny  all;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
        }

        # ── All Other Routes ──────────────────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            client_max_body_size 10M;
            proxy_connect_timeout  60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # ── Health Check (bypass rate limit) ──────────────────────────────────
        location /api/v1/health {
            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            access_log off;             # don't pollute logs with health checks
        }
    }
}